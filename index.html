<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>GLGC Sunday Attendance — Per Hub</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="data.js"></script>
  <style>
    :root { --blue:#1f5fff; --gold:#e6c878; }
    * { box-sizing: border-box; }
    html, body { margin:0; background:#000; color:#fff; font-family:Arial, Helvetica, sans-serif; }
    .wrap { max-width:1100px; margin:0 auto; padding:14px 22px 50px; }

    .nav { display:flex; gap:10px; justify-content:center; margin-bottom:10px; flex-wrap:wrap; }
    .nav a { color:#bbb; text-decoration:none; border:1px solid #333; border-radius:20px;
      padding:7px 16px; font-size:14px; }
    .nav a.active { background:var(--gold); color:#000; border-color:var(--gold); font-weight:bold; }

    .title { text-align:center; font-family:Georgia,'Times New Roman',serif;
      color:var(--gold); font-size:30px; letter-spacing:1px; margin:6px 0 14px; }

    .topbar { display:grid; grid-template-columns:repeat(4, auto); gap:10px 14px;
      align-items:center; justify-content:center; margin-bottom:14px; }
    .topbar .label { color:#999; font-size:13px; text-align:right; }
    select { background:#111; color:#fff; border:1px solid #333; border-radius:8px;
      padding:9px 12px; font-size:15px; min-width:220px; }
    select:disabled { opacity:0.45; }

    .header { position:relative; text-align:center; padding:6px 130px; min-height:120px; }
    .leader { font-size:34px; font-weight:bold; line-height:1.1; }
    .meta { font-size:16px; color:#bcbcbc; margin-top:8px; }
    .meta b { color:#fff; }
    .avatar { position:absolute; top:0; right:0; width:108px; height:108px; border-radius:50%;
      object-fit:cover; border:3px solid #6a6a6a; background:#1a1a1a; }
    .initials { position:absolute; top:0; right:0; width:108px; height:108px; border-radius:50%;
      background:linear-gradient(135deg,#3a3a3a,#5a5a5a); display:flex; align-items:center;
      justify-content:center; font-size:36px; font-weight:bold; border:3px solid #6a6a6a; }

    @media (max-width: 760px) {
      .topbar { grid-template-columns:auto 1fr; }
      .header { padding:0; min-height:auto; }
      .leader { font-size:26px; }
      .avatar, .initials { position:static; margin:14px auto 0; }
      select { min-width:0; width:100%; }
    }

    .legend { display:flex; gap:34px; justify-content:center; margin:18px 0 4px;
      color:#cfcfcf; font-size:16px; }
    .legend span { display:inline-flex; align-items:center; gap:9px; }
    .sw { width:26px; height:14px; border-radius:2px; display:inline-block; }

    .chartbox { height:460px; margin-top:6px; }
    .msg { text-align:center; color:#888; padding:50px; font-size:17px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="nav">
      <a href="index.html" class="active">Per Hub</a>
      <a href="all.html">All Hubs</a>
      <a href="summary.html">Weekly Summary</a>
    </div>

    <div class="title">GLGC SUNDAY ATTENDANCE 2026</div>

    <div class="topbar">
      <span class="label">Service:</span>
      <select id="svc" onchange="onSvc()"></select>

      <span class="label">Choir:</span>
      <select id="choir" onchange="onChoir()"></select>

      <span class="label">Governor:</span>
      <select id="gov" onchange="render()"></select>

      <span class="label">Month:</span>
      <select id="period" onchange="render()">
        <option value="all">All months</option>
      </select>
    </div>

    <div class="header">
      <img id="avatar" class="avatar" alt="" style="display:none">
      <div id="initials" class="initials" style="display:none"></div>
      <div class="leader" id="leader">Loading…</div>
      <div class="meta" id="metaLine"></div>
    </div>

    <div class="legend">
      <span><i class="sw" style="background:var(--blue)"></i> Sunday Attendance</span>
    </div>

    <div class="chartbox"><canvas id="chart"></canvas></div>
    <div class="msg" id="msg" style="display:none">No attendance recorded yet.</div>
  </div>

  <script>
    var MODEL = null, chart = null;

    var MONTH_NAMES = ['January','February','March','April','May','June',
                       'July','August','September','October','November','December'];

    GLGC.load(function (model) {
      MODEL = model;
      var svc = document.getElementById('svc');
      svc.innerHTML = '<option value="__all">All services</option>';
      model.services.forEach(function (S) {
        var o = document.createElement('option');
        o.value = S.service; o.textContent = S.service;
        svc.appendChild(o);
      });

      // Build month options from the actual Sundays present in the sheet,
      // so new months appear automatically as you fill them in.
      var period = document.getElementById('period');
      var seen = {};
      model.weeks.forEach(function (w) {
        var d = w.date instanceof Date ? w.date : new Date(w.date);
        var key = d.getFullYear() + '-' + (d.getMonth() + 1);
        if (seen[key]) return;
        seen[key] = true;
        var o = document.createElement('option');
        o.value = key;
        o.textContent = MONTH_NAMES[d.getMonth()] + ' ' + d.getFullYear();
        period.appendChild(o);
      });

      onSvc();
    }, function (e) {
      document.getElementById('leader').textContent = 'Could not load data';
      console.error(e);
    });

    function onSvc() {
      var svc = document.getElementById('svc').value;
      var choirSel = document.getElementById('choir');
      choirSel.innerHTML = '<option value="__all">All choirs</option>';
      var pool = (svc === '__all')
        ? MODEL.choirs
        : MODEL.choirs.filter(function (C) { return C.service === svc; });
      pool.forEach(function (C) {
        var o = document.createElement('option');
        o.value = C.choir; o.textContent = C.choir;
        choirSel.appendChild(o);
      });
      onChoir();
    }

    function onChoir() {
      var svc = document.getElementById('svc').value;
      var choir = document.getElementById('choir').value;
      var govSel = document.getElementById('gov');
      govSel.innerHTML = '<option value="__all">All governors</option>';

      var pool = MODEL.governors.filter(function (G) {
        if (svc !== '__all' && G.service !== svc) return false;
        if (choir !== '__all' && G.choir !== choir) return false;
        return true;
      });
      pool.sort(function (a, b) { return a.governor.localeCompare(b.governor); })
        .forEach(function (G) {
          var o = document.createElement('option');
          o.value = G.governor; o.textContent = G.governor;
          govSel.appendChild(o);
        });
      // If only one choir is selectable for this service, picking the governor matters most;
      // otherwise default to the choir aggregate.
      govSel.disabled = pool.length === 0;
      render();
    }

    function currentSeries() {
      var svc = document.getElementById('svc').value;
      var choir = document.getElementById('choir').value;
      var gov = document.getElementById('gov').value;

      // Most specific selection wins.
      if (gov !== '__all') {
        var G = MODEL.governors.filter(function (x) { return x.governor === gov; })[0];
        if (!G) return null;
        return {
          title: G.governor,
          subtitle: '<b>' + G.choir + '</b>' + (G.service ? '  ·  ' + G.service : ''),
          points: G.points
        };
      }
      if (choir !== '__all') {
        var C = MODEL.choirs.filter(function (x) { return x.choir === choir; })[0];
        if (!C) return null;
        var govList = C.governors.length + ' governor' + (C.governors.length === 1 ? '' : 's');
        return {
          title: C.choir,
          subtitle: '<b>Whole choir</b>  ·  ' + govList + (C.service ? '  ·  ' + C.service : ''),
          points: C.points
        };
      }
      if (svc !== '__all') {
        var S = MODEL.services.filter(function (x) { return x.service === svc; })[0];
        if (!S) return null;
        return {
          title: S.service,
          subtitle: '<b>Whole service</b>  ·  ' + S.choirs.length + ' choirs  ·  ' +
                    S.governors.length + ' governors',
          points: S.points
        };
      }
      // All services — show grand total across the sheet.
      return {
        title: 'All Services',
        subtitle: '<b>Grand total</b>  ·  every choir, every governor',
        points: MODEL.weeks
      };
    }

    function initials(name) {
      return name.split(/[\s\-]+/).filter(Boolean).slice(0, 2)
        .map(function (w) { return w.charAt(0); }).join('').toUpperCase();
    }

    // Try photos/<name>.jpg → .jpeg → .png → .webp. If none exist, show
    // an initials circle instead. Called on every render() with the current
    // selection's display name (governor / choir / service).
    function setAvatar(name, showInitialsOnly) {
      var img = document.getElementById('avatar');
      var init = document.getElementById('initials');
      if (showInitialsOnly) {
        img.style.display = 'none';
        init.style.display = 'flex';
        init.textContent = initials(name);
        return;
      }
      var exts = ['jpg', 'jpeg', 'png', 'webp'];
      var i = 0;
      function tryNext() {
        if (i >= exts.length) {
          img.style.display = 'none';
          init.style.display = 'flex';
          init.textContent = initials(name);
          return;
        }
        img.onload = function () {
          img.style.display = 'block';
          init.style.display = 'none';
        };
        img.onerror = function () { i++; tryNext(); };
        img.src = 'photos/' + encodeURIComponent(name) + '.' + exts[i];
      }
      init.style.display = 'flex';
      init.textContent = initials(name);
      img.style.display = 'none';
      tryNext();
    }

    function render() {
      if (!MODEL) return;
      var sel = currentSeries();
      if (!sel) return;

      document.getElementById('leader').textContent = sel.title;
      document.getElementById('metaLine').innerHTML = sel.subtitle;

      // Avatar: show photo for any specific selection (governor/choir/service),
      // and just plain initials for the grand-total "All Services" view.
      var svc = document.getElementById('svc').value;
      var choir = document.getElementById('choir').value;
      var gov = document.getElementById('gov').value;
      var isGrandTotal = (svc === '__all' && choir === '__all' && gov === '__all');
      setAvatar(sel.title, isGrandTotal);

      // Keep only weeks where we have a real number for this selection.
      var reported = sel.points.filter(function (p) { return p.attendance != null; });
      // For aggregate selections (whole choir / service / grand total), points carry
      // a `reporters` count — drop weeks where nobody reported (column added but blank).
      // For individual governors, `reporters` is undefined, so we leave their zeros in
      // (a governor really did report 0 for that Sunday).
      var isAggregate = reported.length && reported[0].reporters !== undefined;
      var trimmed = isAggregate
        ? reported.filter(function (p) { return p.reporters > 0; })
        : reported;

      var period = document.getElementById('period').value;
      var pts = trimmed;
      if (period !== 'all') {
        var parts = period.split('-');
        var pickYear = parseInt(parts[0], 10);
        var pickMonth = parseInt(parts[1], 10) - 1;
        pts = trimmed.filter(function (p) {
          var d = p.date instanceof Date ? p.date : new Date(p.date);
          return d.getFullYear() === pickYear && d.getMonth() === pickMonth;
        });
      }

      document.getElementById('msg').style.display = pts.length ? 'none' : 'block';

      var labels = pts.map(function (p) { return ['WK ' + p.week, p.dateLabel]; });
      var att = pts.map(function (p) { return p.attendance; });

      var cfg = {
        type: 'bar',
        plugins: [GLGC.valueLabels],
        data: {
          labels: labels,
          datasets: [
            { label: 'Sunday Attendance', data: att, backgroundColor: '#1f5fff',
              borderRadius: 3, maxBarThickness: 46 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: {
              title: function (items) { return items[0].label.replace(',', '  '); }
            } }
          },
          scales: {
            x: { ticks: { color: '#dddddd', font: { size: 13 } }, grid: { color: '#222' } },
            y: { beginAtZero: true, grace: '10%', ticks: { color: '#dddddd' }, grid: { color: '#222' } }
          }
        }
      };
      if (chart) chart.destroy();
      chart = new Chart(document.getElementById('chart'), cfg);
    }
  </script>
</body>
</html>
